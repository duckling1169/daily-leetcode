name: Daily LeetCode

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC = 9 AM EDT / 8 AM EST (no DST adjust in GH Actions cron)
  workflow_dispatch:        # lets you trigger manually for testing

permissions:
  contents: write           # needed to commit seen.json back

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python daily_leetcode.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit seen.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "Update seen.json"
          git push
